<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="origin">
  <title>Zapfprotokoll</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 520px; margin: auto; background: #f9f9f9; }
    h1 { text-align: center; }
    form { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    input, select, textarea, button { width: 100%; padding: 14px; margin: 8px 0; font-size: 16px; box-sizing: border-box; }
    button { background: #28a745; color: white; border: 0; border-radius: 8px; font-weight: bold; }
    label { display: block; margin-top: 14px; font-weight: bold; }
    .radio-group { display: flex; gap: 10px; margin-top: 8px; }
    .radio-option { flex: 1; text-align: center; padding: 14px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; }
    .radio-option.selected { border-color: #28a745; background: #e8f5e8; }
    .radio-option input { display: none; }
    .error { border: 2px solid red !important; }
    .error-text { color: red; font-size: 14px; margin: -2px 0 8px; }
    .status { margin-top: 12px; font-size: 14px; color: #333; }
  </style>
</head>
<body>

<h1>🍺 Zapfprotokoll</h1>

<form id="zapfForm" action="https://formspree.io/f/maqplozn" method="POST" novalidate>
  <input type="hidden" name="_subject" value="Neuer Zapfeintrag">
  <input type="hidden" name="_format" value="plain">

  <label for="zeit">Datum & Uhrzeit:</label>
  <input type="datetime-local" id="zeit" name="Zeit">

  <label for="flasche">CO₂ Flasche:</label>
  <select id="flasche" name="Flasche">
    <option value="">Bitte wählen...</option>
    <option value="Flasche 1">Flasche 1</option>
    <option value="Flasche 2">Flasche 2</option>
  </select>

  <label for="druck">Restdruck CO₂ (bar):</label>
  <input type="number" id="druck" name="CO2_Druck" step="0.1" inputmode="decimal" placeholder="z.B. 12.5">

  <label for="liter">Gezapft Bier (Liter):</label>
  <input type="number" id="liter" name="Bier_Liter" step="0.1" inputmode="decimal" placeholder="z.B. 25.0">

  <label>Neues Fass geöffnet?</label>
  <div class="radio-group">
    <div class="radio-option" id="btnJa" onclick="selectFass('JA')">
      <input type="radio" name="Neues_Fass" value="JA">
      JA
    </div>
    <div class="radio-option selected" id="btnNein" onclick="selectFass('NEIN')">
      <input type="radio" name="Neues_Fass" value="NEIN" checked>
      NEIN
    </div>
  </div>

  <label for="restFaesser">Restbestand Fässer (optional):</label>
  <input type="number" id="restFaesser" name="Rest_Faesser" step="1" inputmode="numeric" placeholder="z.B. 3">

  <label for="notizen">Notizen (optional):</label>
  <textarea id="notizen" name="Notizen" rows="3" placeholder="Besonderheiten..."></textarea>

  <button type="submit">📧 Loggen & Senden</button>
  <div class="status" id="status"></div>
</form>

<script>
const now = new Date();
const offset = now.getTimezoneOffset() * 60000;
document.getElementById('zeit').value = new Date(now - offset).toISOString().slice(0, 16);

function selectFass(wert) {
  document.querySelectorAll('input[name="Neues_Fass"]').forEach(r => {
    r.checked = (r.value === wert);
  });
  document.getElementById('btnJa').classList.toggle('selected', wert === 'JA');
  document.getElementById('btnNein').classList.toggle('selected', wert === 'NEIN');
}

function clearErrors() {
  document.querySelectorAll('.error-text').forEach(e => e.remove());
  document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));
}

function addError(id, text) {
  const el = document.getElementById(id);
  el.classList.add('error');
  const msg = document.createElement('div');
  msg.className = 'error-text';
  msg.textContent = text;
  el.insertAdjacentElement('afterend', msg);
}

function validateForm() {
  clearErrors();
  let ok = true;

  if (!document.getElementById('zeit').value) {
    addError('zeit', 'Bitte Datum eingeben');
    ok = false;
  }
  if (!document.getElementById('flasche').value) {
    addError('flasche', 'Bitte Flasche auswählen');
    ok = false;
  }
  if (!document.getElementById('druck').value) {
    addError('druck', 'Bitte Restdruck eingeben');
    ok = false;
  }
  if (!document.getElementById('liter').value) {
    addError('liter', 'Bitte Liter eingeben');
    ok = false;
  }

  return ok;
}

document.getElementById('zapfForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  if (!validateForm()) return;

  const form = e.target;
  const status = document.getElementById('status');
  status.textContent = 'Sende an Formspree...';

  const data = new FormData(form);

  try {
    const response = await fetch(form.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      status.textContent = 'Gespeichert. Mail wird geöffnet...';

      const zeit = document.getElementById('zeit').value;
      const flasche = document.getElementById('flasche').value;
      const druck = document.getElementById('druck').value;
      const liter = document.getElementById('liter').value;
      const neuesFass = document.querySelector('input[name="Neues_Fass"]:checked').value;
      const restFaesser = document.getElementById('restFaesser').value || 'Nicht angegeben';
      const notizen = document.getElementById('notizen').value || 'Keine';

      const to = 'anna.dallinger@edu.kl.ac.at';
      const cc = 'nikolaus.zach@edu.kl.ac.at,events@oeh-kl.at';
      const subject = encodeURIComponent(`CO2 ${flasche}: ${druck} bar | Fass: ${neuesFass}`);
      const body = encodeURIComponent(
        `Zapfprotokoll\n\n` +
        `Zeit: ${zeit}\n` +
        `CO2 Flasche: ${flasche}\n` +
        `Restdruck: ${druck} bar\n` +
        `Bier gezapft: ${liter} L\n` +
        `Neues Fass: ${neuesFass}\n` +
        `Rest Fässer: ${restFaesser}\n` +
        `Notizen: ${notizen}`
      );

      window.location.href = `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;
    } else {
      status.textContent = 'Formspree hat nicht akzeptiert. Prüfe den Endpoint im Dashboard.';
    }
  } catch (err) {
    status.textContent = 'Fehler beim Senden an Formspree.';
  }
});
</script>

</body>
</html>
