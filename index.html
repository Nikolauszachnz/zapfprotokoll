<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>🍺 Zapfprotokoll</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
    input, select, button, textarea { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    button { background: #28a745; color: white; border: none; font-weight: bold; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    .radio-group { display: flex; gap: 15px; margin-top: 5px; }
    .radio-option { flex: 1; text-align: center; padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }
    .radio-option.selected { border-color: #28a745; background: #e8f5e8; }
    .radio-option input { display: none; }
  </style>
</head>
<body>

<h1>🍺 Zapfprotokoll</h1>

<!-- WICHTIG: Keine 'action' mehr im form-Tag, wir machen alles per JavaScript -->
<form id="zapfForm">
  <label>Datum:</label>
  <input type="datetime-local" id="zeit" name="zeit" required>
  
  <label>CO₂ Flasche:</label>
  <select id="flasche" name="flasche" required>
    <option value="">Auswählen</option>
    <option value="Flasche 1">Flasche 1</option>
    <option value="Flasche 2">Flasche 2</option>
  </select>
  
  <label>Restdruck CO₂ (bar):</label>
  <input type="number" id="druck" name="druck" step="0.1" required>
  
  <label>Gezapft Bier (L):</label>
  <input type="number" id="liter" name="liter" step="0.1" required>
  
  <label>Neues Fass geöffnet?</label>
  <div class="radio-group">
    <div class="radio-option" onclick="selectFass('ja')">
      <input type="radio" id="fassJa" name="neuesFass" value="JA">
      <strong>JA</strong>
    </div>
    <div class="radio-option" onclick="selectFass('nein')">
      <input type="radio" id="fassNein" name="neuesFass" value="NEIN" checked>
      <strong>NEIN</strong>
    </div>
  </div>
  
  <label>Restbestand Fässer (optional):</label>
  <input type="number" id="restFaesser" name="restFaesser" step="1" placeholder="z.B. 3">
  
  <label>Notizen:</label>
  <textarea id="notizen" name="notizen" rows="3"></textarea>
  
  <button type="button" onclick="sendData()">📧 Loggen & Tracken</button>
</form>

<script>
// Auto-Datum
document.getElementById('zeit').value = new Date().toISOString().slice(0,16);

// Ja/Nein Buttons
function selectFass(wert) {
  document.querySelectorAll('input[name="neuesFass"]').forEach(r => {
    r.checked = (r.value === wert);
  });
  document.querySelectorAll('.radio-option').forEach(opt => {
    opt.classList.remove('selected');
  });
  event.target.closest('.radio-option').classList.add('selected');
}

function sendData() {
  // 1. Werte auslesen
  const zeit = document.getElementById('zeit').value;
  const flasche = document.getElementById('flasche').value;
  const druck = document.getElementById('druck').value;
  const liter = document.getElementById('liter').value;
  const neuesFass = document.querySelector('input[name="neuesFass"]:checked').value;
  const restFaesser = document.getElementById('restFaesser').value;
  const notizen = document.getElementById('notizen').value;

  // ==== TEIL 1: DATEN AN FORMSPREE SENDEN (Hintergrund) ====
  // HIER DEINEN FORMSPREE ENDPOINT EINTRAGEN!
  const formspreeEndpoint = "https://formspree.io/f/DEIN_ENDPOINT_HIER"; 
  
  const formData = new FormData();
  formData.append("Zeit", zeit);
  formData.append("Flasche", flasche);
  formData.append("Druck", druck);
  formData.append("Liter", liter);
  formData.append("Neues_Fass", neuesFass);
  formData.append("Rest_Faesser", restFaesser);
  formData.append("Notizen", notizen);

  // Sende Daten leise im Hintergrund an Formspree
  fetch(formspreeEndpoint, {
    method: "POST",
    body: formData,
    headers: { 'Accept': 'application/json' }
  });

  // ==== TEIL 2: E-MAIL PROGRAMM ÖFFNEN ====
  const to = 'anna.dallinger@edu.kl.ac.at';
  const cc1 = 'nikolaus.zach@edu.kl.ac.at';
  const cc2 = 'events@oeh-kl.at';

  const subject = encodeURIComponent(`CO2 ${flasche}: ${druck} bar | Fass: ${neuesFass}`);
  const body = encodeURIComponent(`
Zapfprotokoll

⏰ Zeit: ${zeit}
🏷️ CO₂: ${flasche} (${druck} bar)
🍺 Bier: ${liter} L
🔄 Neues Fass: ${neuesFass}
${restFaesser ? `📦 Rest Fässer: ${restFaesser}` : ''}

📝 Notizen: ${notizen || '---'}
  `);

  // Öffnet das Mailprogramm mit vorausgefüllten Daten
  window.location.href = `mailto:${to}?cc=${cc1},${cc2}&subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
