<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍺 Zapfprotokoll</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 520px;
      margin: auto;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }
    button:active {
      background: #218838;
    }
    .radio-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .radio-option {
      flex: 1;
      text-align: center;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      background: white;
    }
    .radio-option.selected {
      border-color: #28a745;
      background: #e8f5e8;
    }
    .radio-option input {
      display: none;
    }
    .error {
      border: 2px solid red !important;
      background-color: #ffe6e6;
    }
    .error-text {
      color: red;
      font-size: 14px;
      margin-top: 4px;
      font-weight: bold;
    }
    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>

<h1>🍺 Zapfprotokoll</h1>

<form id="zapfForm" novalidate>
  <label for="zeit">Datum & Uhrzeit:</label>
  <input type="datetime-local" id="zeit">

  <label for="flasche">CO₂ Flasche:</label>
  <select id="flasche">
    <option value="">Bitte wählen...</option>
    <option value="Flasche 1">Flasche 1</option>
    <option value="Flasche 2">Flasche 2</option>
  </select>

  <label for="druck">Restdruck CO₂ (bar):</label>
  <input type="number" id="druck" step="0.1" inputmode="decimal" placeholder="z.B. 12.5">

  <label for="liter">Gezapft Bier (Liter):</label>
  <input type="number" id="liter" step="0.1" inputmode="decimal" placeholder="z.B. 25.0">

  <label>Neues Fass geöffnet?</label>
  <div class="radio-group">
    <div class="radio-option" id="btnJa" onclick="selectFass('JA')">
      <input type="radio" name="neuesFass" value="JA">
      JA
    </div>
    <div class="radio-option selected" id="btnNein" onclick="selectFass('NEIN')">
      <input type="radio" name="neuesFass" value="NEIN" checked>
      NEIN
    </div>
  </div>

  <label for="restFaesser">Restbestand Fässer (optional):</label>
  <input type="number" id="restFaesser" step="1" inputmode="numeric" placeholder="z.B. 3">

  <label for="notizen">Notizen (optional):</label>
  <textarea id="notizen" rows="3" placeholder="Besonderheiten..."></textarea>

  <button type="button" onclick="sendData()">📧 Speichern & Mail senden</button>
  <div id="status" class="status"></div>
</form>

<script>
// Dein Formspree Endpoint
const FORMSPREE_ENDPOINT = "https://formspree.io/f/maqplozn";

// Auto Datum setzen
const now = new Date();
const offset = now.getTimezoneOffset() * 60000;
document.getElementById('zeit').value = new Date(now - offset).toISOString().slice(0, 16);

// JA/NEIN Buttons
function selectFass(wert) {
  document.querySelectorAll('input[name="neuesFass"]').forEach(r => {
    r.checked = (r.value === wert);
  });
  document.getElementById('btnJa').classList.toggle('selected', wert === 'JA');
  document.getElementById('btnNein').classList.toggle('selected', wert === 'NEIN');
}

// Validierung
function clearErrors() {
  document.querySelectorAll('.error-text').forEach(e => e.remove());
  document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));
  document.getElementById('status').textContent = '';
}

function validateForm() {
  clearErrors();
  let ok = true;

  const felder = [
    { id: 'zeit', text: '⚠️ Bitte Datum eingeben' },
    { id: 'flasche', text: '⚠️ Bitte Flasche auswählen' },
    { id: 'druck', text: '⚠️ Bitte Restdruck eingeben' },
    { id: 'liter', text: '⚠️ Bitte Liter eingeben' }
  ];

  felder.forEach(feld => {
    const el = document.getElementById(feld.id);
    if (!el.value) {
      el.classList.add('error');
      const msg = document.createElement('div');
      msg.className = 'error-text';
      msg.textContent = feld.text;
      el.insertAdjacentElement('afterend', msg);
      ok = false;
    }
  });

  if (!ok) {
    document.querySelector('.error').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return ok;
}

// Hauptfunktion: Erst Formspree, dann Mail
async function sendData() {
  if (!validateForm()) return;

  const status = document.getElementById('status');
  status.textContent = 'Speichere...';

  // Werte sammeln
  const zeit = document.getElementById('zeit').value;
  const flasche = document.getElementById('flasche').value;
  const druck = document.getElementById('druck').value;
  const liter = document.getElementById('liter').value;
  const neuesFass = document.querySelector('input[name="neuesFass"]:checked').value;
  const restFaesser = document.getElementById('restFaesser').value || 'Nicht angegeben';
  const notizen = document.getElementById('notizen').value || 'Keine';

  // ==== SCHRITT 1: FORMSPREE (Tracking) ====
  try {
    await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 
        'Accept': 'application/json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        Zeit: zeit,
        Flasche: flasche,
        CO2_Druck: druck + ' bar',
        Bier_Liter: liter + ' L',
        Neues_Fass: neuesFass,
        Rest_Faesser: restFaesser,
        Notizen: notizen
      })
    });
    status.textContent = 'Gespeichert. Öffne Mail...';
  } catch (err) {
    // Wenn Formspree fehlschlägt, trotzdem weiter mit Mail
    status.textContent = 'Tracking fehlgeschlagen, öffne trotzdem Mail...';
  }

  // ==== SCHRITT 2: MAILTO (E-Mail öffnen) ====
  // Kurze Verzögerung damit Formspree Zeit hat
  setTimeout(() => {
    const to = 'anna.dallinger@edu.kl.ac.at';
    const cc = 'nikolaus.zach@edu.kl.ac.at,events@oeh-kl.at';
    
    const subject = encodeURIComponent(`CO2 ${flasche}: ${druck} bar | Fass: ${neuesFass}`);
    const body = encodeURIComponent(
      `Zapfprotokoll\n\n` +
      `Zeit: ${zeit}\n` +
      `CO2 Flasche: ${flasche}\n` +
      `Restdruck: ${druck} bar\n` +
      `Bier gezapft: ${liter} L\n` +
      `Neues Fass: ${neuesFass}\n` +
      `Rest Fässer: ${restFaesser}\n` +
      `Notizen: ${notizen}`
    );

    // Mobile-freundlich: Unsichtbarer Link
    const link = document.createElement('a');
    link.href = `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }, 500);
}
</script>

</body>
</html>
