<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍺 Zapfprotokoll</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f9f9f9; }
    h1 { text-align: center; color: #333; font-size: 24px; }
    form { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, select, button, textarea { width: 100%; padding: 15px; margin: 8px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: #28a745; color: white; border: none; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
    button:active { background: #218838; }
    label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
    
    .radio-group { display: flex; gap: 10px; margin-top: 5px; }
    .radio-option { flex: 1; text-align: center; padding: 15px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 16px; }
    .radio-option.selected { border-color: #28a745; background: #e8f5e8; color: #1e7e34; font-weight: bold; }
    .radio-option input { display: none; }
    
    .fehler { border: 2px solid red !important; background-color: #ffe6e6; }
    .fehler-text { color: red; font-size: 14px; margin: -5px 0 10px 0; font-weight: bold; }
  </style>
</head>
<body>

<h1>🍺 Zapfprotokoll</h1>

<form id="zapfForm" novalidate>

  <label>Datum:</label>
  <input type="datetime-local" id="zeit" name="Zeit">

  <label>CO₂ Flasche:</label>
  <select id="flasche" name="Flasche">
    <option value="">Bitte wählen...</option>
    <option value="Flasche 1">Flasche 1</option>
    <option value="Flasche 2">Flasche 2</option>
  </select>

  <label>Restdruck CO₂ (bar):</label>
  <input type="number" id="druck" name="Restdruck" step="0.1" inputmode="decimal">

  <label>Gezapft Bier (Liter):</label>
  <input type="number" id="liter" name="Gezapfte_Liter" step="0.1" inputmode="decimal">

  <label>Neues Fass geöffnet?</label>
  <div class="radio-group">
    <div class="radio-option" onclick="selectFass('JA')">
      <input type="radio" id="fassJa" name="Neues_Fass" value="JA">
      JA
    </div>
    <div class="radio-option selected" onclick="selectFass('NEIN')">
      <input type="radio" id="fassNein" name="Neues_Fass" value="NEIN" checked>
      NEIN
    </div>
  </div>

  <label>Restbestand Fässer (optional):</label>
  <input type="number" id="restFaesser" name="Restbestand_Faesser" step="1" inputmode="numeric" placeholder="z.B. 3">

  <label>Notizen (optional):</label>
  <textarea id="notizen" name="Notizen" rows="3" placeholder="Besonderheiten..."></textarea>

  <button type="button" onclick="sendData()">📧 Loggen & Senden</button>
</form>

<script>
// Aktuelles Datum/Uhrzeit einsetzen
const now = new Date();
const offset = now.getTimezoneOffset() * 60000;
const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
document.getElementById('zeit').value = localISOTime;

// Button-Logik für JA/NEIN
function selectFass(wert) {
  document.querySelectorAll('input[name="Neues_Fass"]').forEach(r => {
    r.checked = (r.value === wert);
  });
  document.querySelectorAll('.radio-option').forEach(opt => {
    opt.classList.remove('selected');
  });
  const target = event.currentTarget || event.target.closest('.radio-option');
  if(target) target.classList.add('selected');
}

// Validierung (Rote Rahmen wenn leer)
function validieren() {
  let ok = true;
  document.querySelectorAll('.fehler-text').forEach(e => e.remove());
  document.querySelectorAll('.fehler').forEach(e => e.classList.remove('fehler'));

  const felder = [
    { id: 'zeit', text: 'Bitte Datum eingeben' },
    { id: 'flasche', text: 'Bitte Flasche auswählen' },
    { id: 'druck', text: 'Bitte Restdruck eingeben' },
    { id: 'liter', text: 'Bitte gezapfte Liter eingeben' }
  ];

  felder.forEach(feld => {
    const el = document.getElementById(feld.id);
    if (!el.value) {
      el.classList.add('fehler');
      const msg = document.createElement('div');
      msg.className = 'fehler-text';
      msg.innerText = feld.text;
      el.parentNode.insertBefore(msg, el.nextSibling);
      ok = false;
    }
  });

  if (!ok) {
    document.querySelector('.fehler').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return ok;
}

function sendData() {
  if (!validieren()) return;

  // 1. Daten direkt aus dem Formular-Objekt holen (das ist der Fix für Formspree!)
  const formElement = document.getElementById('zapfForm');
  const formData = new FormData(formElement);

  // Fallback für leere optionale Felder
  if(!document.getElementById('restFaesser').value) formData.set('Restbestand_Faesser', '---');
  if(!document.getElementById('notizen').value) formData.set('Notizen', '---');

  // *** WICHTIG: HIER DEINEN FORMSPREE ENDPOINT EINTRAGEN! ***
  const formspreeEndpoint = "https://formspree.io/f/maqplozn"; 
  
  if (formspreeEndpoint && formspreeEndpoint.includes("/f/")) {
    // Sende leise im Hintergrund an Formspree
    fetch(formspreeEndpoint, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    }).then(response => {
      console.log("Formspree Status:", response.ok);
    }).catch(error => console.error("Formspree Fehler:", error));
  }

  // 2. MOBILE-MAILTO FIX (Öffnet Mail-App)
  const flasche = document.getElementById('flasche').value;
  const druck = document.getElementById('druck').value;
  const neuesFass = document.querySelector('input[name="Neues_Fass"]:checked').value;
  const liter = document.getElementById('liter').value;
  const zeit = document.getElementById('zeit').value;
  const rest = document.getElementById('restFaesser').value || 'Nicht angegeben';
  const notiz = document.getElementById('notizen').value || 'Keine Notizen';

  const to = 'anna.dallinger@edu.kl.ac.at';
  const cc = 'nikolaus.zach@edu.kl.ac.at,events@oeh-kl.at';
  
  const subject = encodeURIComponent(`CO2 ${flasche}: ${druck} bar | Fass: ${neuesFass}`);
  const body = encodeURIComponent(`Zapfprotokoll\n\n⏰ Zeit: ${zeit}\n🏷️ CO2: ${flasche} (${druck} bar)\n🍺 Bier: ${liter} L\n🔄 Neues Fass: ${neuesFass}\n📦 Rest Fässer: ${rest}\n📝 Notizen: ${notiz}`);

  // Unsichtbarer Link-Trick fürs Handy
  const mailtoLink = `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;
  const link = document.createElement('a');
  link.href = mailtoLink;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  
  setTimeout(() => {
    document.body.removeChild(link);
  }, 500);
}
</script>

</body>
</html>
