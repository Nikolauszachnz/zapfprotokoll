<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍺 Zapfprotokoll</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f9f9f9; }
    h1 { text-align: center; color: #333; font-size: 24px; }
    form { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input, select, button, textarea { width: 100%; padding: 15px; margin: 8px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { background: #28a745; color: white; border: none; font-weight: bold; font-size: 18px; margin-top: 20px; cursor: pointer; }
    button:active { background: #218838; }
    label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
    .radio-group { display: flex; gap: 10px; margin-top: 5px; }
    .radio-option { flex: 1; text-align: center; padding: 15px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 18px; }
    .radio-option.selected { border-color: #28a745; background: #e8f5e8; color: #1e7e34; font-weight: bold; }
    .radio-option input { display: none; }
    .fehler { border: 2px solid red !important; background-color: #ffe6e6; }
    .fehler-text { color: red; font-size: 14px; margin: -5px 0 8px 0; font-weight: bold; }
  </style>
</head>
<body>

<h1>🍺 Zapfprotokoll</h1>

<form id="zapfForm" novalidate>

  <label>Datum & Uhrzeit:</label>
  <input type="datetime-local" id="zeit" name="zeit">

  <label>CO₂ Flasche:</label>
  <select id="flasche" name="flasche">
    <option value="">Bitte wählen...</option>
    <option value="Flasche 1">Flasche 1</option>
    <option value="Flasche 2">Flasche 2</option>
  </select>

  <label>Restdruck CO₂ (bar):</label>
  <input type="number" id="druck" name="druck" step="0.1" inputmode="decimal" placeholder="z.B. 12.5">

  <label>Gezapft Bier (Liter):</label>
  <input type="number" id="liter" name="liter" step="0.1" inputmode="decimal" placeholder="z.B. 25.0">

  <label>Neues Fass geöffnet?</label>
  <div class="radio-group">
    <div class="radio-option" id="btnJa" onclick="selectFass('JA')">
      <input type="radio" name="neuesFass" value="JA">
      JA
    </div>
    <div class="radio-option selected" id="btnNein" onclick="selectFass('NEIN')">
      <input type="radio" name="neuesFass" value="NEIN" checked>
      NEIN
    </div>
  </div>

  <label>Restbestand Fässer (optional):</label>
  <input type="number" id="restFaesser" name="restFaesser" step="1" inputmode="numeric" placeholder="z.B. 3">

  <label>Notizen (optional):</label>
  <textarea id="notizen" name="notizen" rows="3" placeholder="Besonderheiten..."></textarea>

  <button type="button" onclick="sendData()">📧 Loggen & Senden</button>

</form>

<script>
// Auto Datum/Uhrzeit (Handy-kompatibel)
const now = new Date();
const offset = now.getTimezoneOffset() * 60000;
document.getElementById('zeit').value = new Date(now - offset).toISOString().slice(0, 16);

// JA/NEIN Buttons
function selectFass(wert) {
  document.querySelectorAll('input[name="neuesFass"]').forEach(r => {
    r.checked = (r.value === wert);
  });
  document.getElementById('btnJa').classList.toggle('selected', wert === 'JA');
  document.getElementById('btnNein').classList.toggle('selected', wert === 'NEIN');
}

// Eigene Validierung
function validieren() {
  let ok = true;

  document.querySelectorAll('.fehler-text').forEach(e => e.remove());
  document.querySelectorAll('.fehler').forEach(e => e.classList.remove('fehler'));

  const felder = [
    { id: 'zeit',    text: '⚠️ Bitte Datum eingeben' },
    { id: 'flasche', text: '⚠️ Bitte Flasche auswählen' },
    { id: 'druck',   text: '⚠️ Bitte Restdruck eingeben' },
    { id: 'liter',   text: '⚠️ Bitte Liter eingeben' }
  ];

  felder.forEach(feld => {
    const el = document.getElementById(feld.id);
    if (!el.value) {
      el.classList.add('fehler');
      const msg = document.createElement('div');
      msg.className = 'fehler-text';
      msg.innerText = feld.text;
      el.parentNode.insertBefore(msg, el.nextSibling);
      ok = false;
    }
  });

  if (!ok) {
    document.querySelector('.fehler').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return ok;
}

function sendData() {
  if (!validieren()) return;

  // Werte auslesen
  const zeit       = document.getElementById('zeit').value;
  const flasche    = document.getElementById('flasche').value;
  const druck      = document.getElementById('druck').value;
  const liter      = document.getElementById('liter').value;
  const neuesFass  = document.querySelector('input[name="neuesFass"]:checked').value;
  const restFaesser = document.getElementById('restFaesser').value || 'Nicht angegeben';
  const notizen    = document.getElementById('notizen').value || 'Keine';

  // ==== FORMSPREE (Hintergrund, für Auswertung) ====
  // Dein Endpoint ist jetzt eingetragen!
  fetch("https://formspree.io/f/maqplozn", {
    method: "POST",
    headers: { "Accept": "application/json", "Content-Type": "application/json" },
    body: JSON.stringify({
      "Zeit":         zeit,
      "Flasche":      flasche,
      "CO2_Druck":    druck + " bar",
      "Bier_Liter":   liter + " L",
      "Neues_Fass":   neuesFass,
      "Rest_Faesser": restFaesser,
      "Notizen":      notizen
    })
  }).catch(err => console.warn("Formspree:", err));

  // ==== MAILTO (Mobile-Fix: unsichtbarer Link) ====
  const to = 'anna.dallinger@edu.kl.ac.at';
  const cc = 'nikolaus.zach@edu.kl.ac.at,events@oeh-kl.at';

  const subject = encodeURIComponent(
    `CO2 ${flasche}: ${druck} bar | Fass: ${neuesFass}`
  );
  const body = encodeURIComponent(
    `Zapfprotokoll\n\n` +
    `Zeit:          ${zeit}\n` +
    `CO2 Flasche:   ${flasche}\n` +
    `Restdruck:     ${druck} bar\n` +
    `Bier gezapft:  ${liter} L\n` +
    `Neues Fass:    ${neuesFass}\n` +
    `Rest Faesser:  ${restFaesser}\n` +
    `Notizen:       ${notizen}`
  );

  const link = document.createElement('a');
  link.href = `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  setTimeout(() => document.body.removeChild(link), 500);
}
</script>

</body>
</html>
