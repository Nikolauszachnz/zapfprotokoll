<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="origin">
  <title>🍺 Zapfprotokoll</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 520px;
      margin: auto;
      background: #f7f7f7;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }
    .radio-group {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .radio-option {
      flex: 1;
      text-align: center;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      background: white;
    }
    .radio-option.selected {
      border-color: #28a745;
      background: #e8f5e8;
    }
    .radio-option input {
      display: none;
    }
    .error {
      border: 2px solid red !important;
    }
    .error-text {
      color: red;
      font-size: 14px;
      margin-top: 4px;
    }
    .status {
      margin-top: 14px;
      font-size: 14px;
    }
    .success {
      color: #1e7e34;
    }
    .fail {
      color: #b00020;
    }
  </style>
</head>
<body>

<h1>🍺 Zapfprotokoll</h1>

<form id="zapfForm" novalidate>
  <input type="hidden" name="_subject" value="Neuer Zapfeintrag">

  <label for="zeit">Datum & Uhrzeit:</label>
  <input type="datetime-local" id="zeit" name="Zeit">

  <label for="flasche">CO₂ Flasche:</label>
  <select id="flasche" name="Flasche">
    <option value="">Bitte wählen...</option>
    <option value="Flasche 1">Flasche 1</option>
    <option value="Flasche 2">Flasche 2</option>
  </select>

  <label for="druck">Restdruck CO₂ (bar):</label>
  <input type="number" id="druck" name="CO2_Druck" step="0.1" inputmode="decimal" placeholder="z.B. 12.5">

  <label for="liter">Gezapft Bier (Liter):</label>
  <input type="number" id="liter" name="Bier_Liter" step="0.1" inputmode="decimal" placeholder="z.B. 25.0">

  <label>Neues Fass geöffnet?</label>
  <div class="radio-group">
    <div class="radio-option" id="btnJa" onclick="selectFass('JA')">
      <input type="radio" name="Neues_Fass" value="JA">
      JA
    </div>
    <div class="radio-option selected" id="btnNein" onclick="selectFass('NEIN')">
      <input type="radio" name="Neues_Fass" value="NEIN" checked>
      NEIN
    </div>
  </div>

  <label for="restFaesser">Restbestand Fässer (optional):</label>
  <input type="number" id="restFaesser" name="Rest_Faesser" step="1" inputmode="numeric" placeholder="z.B. 3">

  <label for="notizen">Notizen (optional):</label>
  <textarea id="notizen" name="Notizen" rows="3" placeholder="Besonderheiten..."></textarea>

  <button type="submit">Speichern</button>
  <div id="status" class="status"></div>
</form>

<script>
const endpoint = "https://formspree.io/f/maqplozn";

const now = new Date();
const offset = now.getTimezoneOffset() * 60000;
document.getElementById('zeit').value = new Date(now - offset).toISOString().slice(0, 16);

function selectFass(wert) {
  document.querySelectorAll('input[name="Neues_Fass"]').forEach(r => {
    r.checked = (r.value === wert);
  });
  document.getElementById('btnJa').classList.toggle('selected', wert === 'JA');
  document.getElementById('btnNein').classList.toggle('selected', wert === 'NEIN');
}

function clearErrors() {
  document.querySelectorAll('.error-text').forEach(e => e.remove());
  document.querySelectorAll('.error').forEach(e => e.classList.remove('error'));
}

function addError(id, text) {
  const el = document.getElementById(id);
  el.classList.add('error');
  const msg = document.createElement('div');
  msg.className = 'error-text';
  msg.textContent = text;
  el.insertAdjacentElement('afterend', msg);
}

function validateForm() {
  clearErrors();
  let ok = true;

  if (!document.getElementById('zeit').value) {
    addError('zeit', 'Bitte Datum eingeben');
    ok = false;
  }
  if (!document.getElementById('flasche').value) {
    addError('flasche', 'Bitte Flasche auswählen');
    ok = false;
  }
  if (!document.getElementById('druck').value) {
    addError('druck', 'Bitte Restdruck eingeben');
    ok = false;
  }
  if (!document.getElementById('liter').value) {
    addError('liter', 'Bitte Liter eingeben');
    ok = false;
  }

  return ok;
}

document.getElementById('zapfForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const status = document.getElementById('status');
  status.className = 'status';

  if (!validateForm()) {
    status.textContent = 'Bitte markierte Felder ausfüllen.';
    status.classList.add('fail');
    return;
  }

  status.textContent = 'Sende...';

  const formData = new FormData(this);

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      status.textContent = 'Erfolgreich gespeichert.';
      status.classList.add('success');
      this.reset();
      document.getElementById('zeit').value = new Date(new Date() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16);
      selectFass('NEIN');
    } else {
      status.textContent = 'Senden fehlgeschlagen.';
      status.classList.add('fail');
    }
  } catch (error) {
    status.textContent = 'Netzwerkfehler beim Senden.';
    status.classList.add('fail');
  }
});
</script>

</body>
</html>
